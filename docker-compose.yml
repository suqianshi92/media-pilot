services:
  # One-shot bootstrap. Generates shared Prowlarr/qB credentials on first run.
  media-pilot-init:
    image: ${MEDIA_PILOT_IMAGE}
    container_name: media-pilot-init
    command: ["python", "-m", "media_pilot.deployment.bootstrap"]
    environment:
      TZ: ${TZ}
      # Leave empty to generate deployment-local credentials.
      MEDIA_PILOT_PROWLARR_API_KEY: ${MEDIA_PILOT_PROWLARR_API_KEY}
      MEDIA_PILOT_QBITTORRENT_PASSWORD: ${MEDIA_PILOT_QBITTORRENT_PASSWORD}
      # Empty means qB's default username, usually admin.
      MEDIA_PILOT_QBITTORRENT_USERNAME: ${MEDIA_PILOT_QBITTORRENT_USERNAME}
      # Set to 1 only when intentionally overwriting Prowlarr/qB config.
      MEDIA_PILOT_BOOTSTRAP_FORCE: ${MEDIA_PILOT_BOOTSTRAP_FORCE}
      MEDIA_PILOT_BOOTSTRAP_PROWLARR_CONFIG_DIR: /prowlarr-config
      MEDIA_PILOT_BOOTSTRAP_QBITTORRENT_CONFIG_DIR: /qbittorrent-config
    volumes:
      - shared-secrets:/data
      - ${PROWLARR_CONFIG_DIR}:/prowlarr-config:rw
      - ${QBITTORRENT_CONFIG_DIR}:/qbittorrent-config:rw
    networks:
      - media-pilot-net
    restart: "no"

  media-pilot-prowlarr-init:
    image: ${MEDIA_PILOT_IMAGE}
    container_name: media-pilot-prowlarr-init
    command: ["python", "-m", "media_pilot.deployment.prowlarr_indexers"]
    environment:
      TZ: ${TZ}
      MEDIA_PILOT_PROWLARR_INIT_URL: http://media-pilot-prowlarr:9696
      MEDIA_PILOT_SHARED_SECRETS_PATH: /secrets/shared-secrets.env
    volumes:
      - shared-secrets:/secrets:ro
    depends_on:
      media-pilot-init:
        condition: service_completed_successfully
      # The init command retries Prowlarr's API during startup.
      media-pilot-prowlarr:
        condition: service_started
    networks:
      - media-pilot-net
    restart: "no"

  media-pilot:
    image: ${MEDIA_PILOT_IMAGE}
    container_name: media-pilot
    ports:
      - "${MEDIA_PILOT_PORT}:8000"
    environment:
      TZ: ${TZ}
      MEDIA_PILOT_SHARED_SECRETS_PATH: /secrets/shared-secrets.env
      MEDIA_PILOT_LLM_API_KEY: ${MEDIA_PILOT_LLM_API_KEY}
      MEDIA_PILOT_LLM_BASE_URL: ${MEDIA_PILOT_LLM_BASE_URL}
      MEDIA_PILOT_LLM_MODEL: ${MEDIA_PILOT_LLM_MODEL}
      MEDIA_PILOT_TMDB_API_KEY: ${MEDIA_PILOT_TMDB_API_KEY}
      MEDIA_PILOT_TPDB_API_KEY: ${MEDIA_PILOT_TPDB_API_KEY}
      # Empty credentials fall back to shared-secrets generated by init.
      MEDIA_PILOT_PROWLARR_URL: ${MEDIA_PILOT_PROWLARR_URL}
      MEDIA_PILOT_PROWLARR_API_KEY: ${MEDIA_PILOT_PROWLARR_API_KEY}
      MEDIA_PILOT_QBITTORRENT_URL: ${MEDIA_PILOT_QBITTORRENT_URL}
      MEDIA_PILOT_QBITTORRENT_USERNAME: ${MEDIA_PILOT_QBITTORRENT_USERNAME}
      MEDIA_PILOT_QBITTORRENT_PASSWORD: ${MEDIA_PILOT_QBITTORRENT_PASSWORD}
    volumes:
      - shared-secrets:/secrets:ro
      - ${MEDIA_PILOT_DOWNLOADS_DIR}:/data/downloads
      - ${MEDIA_PILOT_WATCH_DIR}:/data/watch
      - ${MEDIA_PILOT_WORKSPACE_DIR}:/data/workspace
      - ${MEDIA_PILOT_MOVIES_DIR}:/data/library/movies
      - ${MEDIA_PILOT_SHOWS_DIR}:/data/library/shows
      - ${MEDIA_PILOT_DATABASE_DIR}:/data/db
      - ${MEDIA_PILOT_ADULT_MOVIES_DIR}:/data/library/adult
      - ${MEDIA_PILOT_TRASH_DIR}:/data/trash
    depends_on:
      media-pilot-init:
        condition: service_completed_successfully
      media-pilot-prowlarr-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - media-pilot-net

  media-pilot-prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: media-pilot-prowlarr
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ${PROWLARR_CONFIG_DIR}:/config
    ports:
      - "${PROWLARR_PORT}:9696"
    networks:
      - media-pilot-net
    restart: unless-stopped

  media-pilot-qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: media-pilot-qbittorrent
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      WEBUI_PORT: 8080
    volumes:
      - ${QBITTORRENT_CONFIG_DIR}:/config
      - ${MEDIA_PILOT_DOWNLOADS_DIR}:/data/downloads
    ports:
      - "${QBITTORRENT_PORT}:8080"
    networks:
      - media-pilot-net
    restart: unless-stopped

  # Optional: FlareSolverr for Cloudflare-protected indexers.
  #
  # It is disabled by default because the bundled public indexers do not use a
  # Prowlarr indexer proxy. If you add a protected indexer later, uncomment this
  # service and configure the matching proxy in Prowlarr UI.
  #
  # media-pilot-flaresolverr:
  #   image: ghcr.io/flaresolverr/flaresolverr:latest
  #   container_name: media-pilot-flaresolverr
  #   environment:
  #     LOG_LEVEL: ${FLARESOLVERR_LOG_LEVEL}
  #     TZ: ${TZ}
  #   ports:
  #     - "${FLARESOLVERR_PORT}:8191"
  #   restart: unless-stopped
  #   networks:
  #     - media-pilot-net

volumes:
  shared-secrets:
    driver: local

networks:
  media-pilot-net:
    driver: bridge
